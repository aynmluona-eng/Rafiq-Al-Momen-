name: Build Android APK
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Release APK
        run: |
          cd android
          keytool -genkey -v -keystore app/release.keystore -alias rafiq -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Rafiq, OU=Al Momen, O=Rafiq, L=City, ST=State, C=US"
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease -PMYAPP_RELEASE_STORE_FILE=release.keystore -PMYAPP_RELEASE_STORE_PASSWORD=password -PMYAPP_RELEASE_KEY_ALIAS=rafiq -PMYAPP_RELEASE_KEY_PASSWORD=password

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: android/app/release.keystore
